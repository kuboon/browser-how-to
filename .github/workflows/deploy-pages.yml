name: Deploy demo site to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      pull-requests: write
      id-token: write
    uses: kuboon/workflows/.github/workflows/github-page-with-preview.yaml@v0.15.0
    with:
      build-command: |
        corepack enable
        pnpm install --frozen-lockfile
        pnpm build
        SITE_BASE="$BASE_URL/" pnpm --filter @kuboon/how-to-site build
      dist-dir: site/dist
