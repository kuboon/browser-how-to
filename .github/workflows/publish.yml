# パッケージ公開ワークフロー（GitHub Packages + JSR、npm には公開しない）
# 単一パッケージ @kuboon/browser-how-to を、main への push で公開する。
#
# 動作:
#   - main に push されると実行。packages/browser-how-to/package.json の version が
#     まだ各レジストリに無いときだけ publish する（同じ version の再 push では skip。
#     公開したいときは version を上げて main に入れる）。
#   - 手動実行（workflow_dispatch）も可。
#
# 事前準備（初回のみ）:
#   - GitHub Packages: 追加設定不要（GITHUB_TOKEN で公開）。
#   - JSR: jsr.io でパッケージ @kuboon/browser-how-to を作成し、設定で GitHub リポジトリ
#     kuboon/browser-how-to をリンクしておく（OIDC trusted publishing 用）。

name: Publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@kuboon"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./packages/browser-how-to/package.json').version")
          if npm view "@kuboon/browser-how-to@$VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@kuboon/browser-how-to@$VERSION は GitHub Packages に公開済みのため skip"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # private な site は対象外。public な @kuboon/browser-how-to のみ公開される。
      - if: steps.check.outputs.publish == 'true'
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR の OIDC trusted publishing に必要
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./packages/browser-how-to/package.json').version")
          if curl -fsSL "https://jsr.io/@kuboon/browser-how-to/meta.json" 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@kuboon/browser-how-to@$VERSION は JSR に公開済みのため skip"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.publish == 'true'
        name: Publish @kuboon/browser-how-to
        run: npx -y jsr@latest publish
        working-directory: packages/browser-how-to
